services:
  # Backend Express Server
  - type: web
    name: foyer-manager-api
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: foyer-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend (if hosted on Render)
  - type: web
    name: foyer-manager-client
    runtime: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routingRules:
      - route: /*
        rewrite: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://foyer-manager-api.onrender.com/api

databases:
  - name: foyer-db
    plan: free
    databaseName: foyer_manager
    user: foyer_user
